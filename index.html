<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ワーママのためのClaude活用アイデア100選</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink:    #f472b6;
      --pink-l:  #fce7f3;
      --coral:   #fb923c;
      --coral-l: #fff7ed;
      --mint:    #34d399;
      --mint-l:  #d1fae5;
      --sky:     #38bdf8;
      --sky-l:   #e0f2fe;
      --purple:  #a78bfa;
      --purple-l:#ede9fe;
      --yellow:  #fbbf24;
      --yellow-l:#fef9c3;
      --rose:    #fb7185;
      --rose-l:  #ffe4e6;
      --teal:    #2dd4bf;
      --teal-l:  #ccfbf1;

      --bg:      #fff8fb;
      --card-bg: #ffffff;
      --text:    #3b1f2b;
      --sub:     #9b6e82;
      --border:  #f3d5e7;
      --shadow:  rgba(244,114,182,0.12);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ===== HEADER / HERO ===== */
    .hero {
      background: linear-gradient(135deg, #fce7f3 0%, #fff0f6 40%, #fef3c7 100%);
      padding: 64px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 15% 30%, rgba(244,114,182,.18) 0%, transparent 55%),
        radial-gradient(circle at 85% 70%, rgba(251,146,60,.14) 0%, transparent 55%),
        radial-gradient(circle at 50% 90%, rgba(52,211,153,.12) 0%, transparent 45%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-block;
      background: linear-gradient(90deg, #f472b6, #fb923c);
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.25;
      background: linear-gradient(135deg, #db2777, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .hero-sub {
      font-size: 1rem;
      color: #9b6e82;
      max-width: 560px;
      margin: 0 auto 32px;
    }
    .hero-count {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .hero-count-item {
      text-align: center;
    }
    .hero-count-num {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f472b6, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .hero-count-label {
      font-size: .75rem;
      color: #9b6e82;
      margin-top: 2px;
    }
    .emoji-deco {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    /* ===== CONTROLS ===== */
    .controls {
      max-width: 1200px;
      margin: 32px auto 0;
      padding: 0 20px;
    }
    .search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto 24px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #c084a2;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: #c084a2; }
    .search-input:focus {
      border-color: #f472b6;
      box-shadow: 0 0 0 3px rgba(244,114,182,.15);
    }

    .filter-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 6px 16px;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: .82rem;
      font-weight: 600;
      color: var(--sub);
      cursor: pointer;
      transition: all .18s;
    }
    .filter-btn:hover { border-color: #f472b6; color: #db2777; }
    .filter-btn.active {
      background: linear-gradient(135deg, #f472b6, #fb923c);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 2px 10px rgba(244,114,182,.35);
    }

    .result-count {
      text-align: center;
      font-size: .82rem;
      color: #c084a2;
      margin-bottom: 24px;
    }

    /* ===== GRID ===== */
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 64px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1.5px solid var(--border);
      padding: 20px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px var(--shadow);
      border-color: #f9a8d4;
    }
    .card.copied { animation: pulse .4s ease; }
    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .card-num {
      font-size: .72rem;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #f472b6, #fb923c);
      border-radius: 6px;
      min-width: 28px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .card-tag {
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 999px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .card-text {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.55;
      flex: 1;
    }
    .card-prompt {
      font-size: .78rem;
      color: var(--sub);
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 10px;
      line-height: 1.5;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .copy-hint {
      font-size: .72rem;
      color: #d4a0bb;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .copy-hint svg { width: 13px; height: 13px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #f472b6, #fb923c);
      color: #fff;
      font-size: .85rem;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 999px;
      box-shadow: 0 4px 20px rgba(244,114,182,.4);
      opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 24px;
      font-size: .78rem;
      color: #c084a2;
      border-top: 1px solid var(--border);
    }

    /* ===== HIDDEN ===== */
    .card.hidden { display: none; }

    /* ===== CATEGORY COLOR TOKENS ===== */
    /* Each category gets a color token applied via JS data-cat attribute */
  </style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <span class="emoji-deco">👩‍💼💕</span>
  <div class="hero-badge">WORKING MOM × CLAUDE</div>
  <h1>ワーママのための<br>Claude活用アイデア100選</h1>
  <p class="hero-sub">仕事・育児・家事・自分時間…毎日忙しいワーママがClaudeを使ってもっとラクに・スマートに・自分らしく過ごすためのプロンプトアイデア集です。</p>
  <div class="hero-count">
    <div class="hero-count-item">
      <div class="hero-count-num">100</div>
      <div class="hero-count-label">個のアイデア</div>
    </div>
    <div class="hero-count-item">
      <div class="hero-count-num">8</div>
      <div class="hero-count-label">カテゴリ</div>
    </div>
    <div class="hero-count-item">
      <div class="hero-count-num">∞</div>
      <div class="hero-count-label">活用の可能性</div>
    </div>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="キーワードで絞り込む（例：献立、メール、時短…）" />
  </div>
  <div class="filter-wrap" id="filterWrap"></div>
  <p class="result-count" id="resultCount"></p>
</div>

<!-- GRID -->
<main class="grid" id="grid"></main>

<!-- TOAST -->
<div class="toast" id="toast">📋 コピーしました！</div>

<!-- FOOTER -->
<footer>
  <p>ワーママのための Claude 活用アイデア 100選 ✦ カードをクリックするとプロンプトをコピーできます</p>
</footer>

<script>
// ===== DATA =====
const categories = [
  { id: "work",    label: "💼 仕事効率化",  color: "#6366f1", light: "#eef2ff" },
  { id: "parenting",label: "👶 育児・子育て",color: "#f472b6", light: "#fce7f3" },
  { id: "home",    label: "🏠 家事・家庭管理",color: "#34d399", light: "#d1fae5" },
  { id: "time",    label: "⏰ 時間管理",    color: "#fb923c", light: "#fff7ed" },
  { id: "career",  label: "🚀 キャリア",    color: "#a78bfa", light: "#ede9fe" },
  { id: "health",  label: "💆 健康・メンタル",color: "#2dd4bf", light: "#ccfbf1" },
  { id: "money",   label: "💰 お金・節約",  color: "#fbbf24", light: "#fef9c3" },
  { id: "self",    label: "🌸 自己啓発・学び",color: "#fb7185", light: "#ffe4e6" },
];

const ideas = [
  // 💼 仕事効率化 (1-13)
  { id:1,  cat:"work", title:"今日のタスクを優先順位順に整理", prompt:"今日やるべきタスクを次のリストから優先度・緊急度で整理して、アイゼンハワーマトリクスに当てはめてください。タスク：[ここにタスクを書く]" },
  { id:2,  cat:"work", title:"メールの返信文を自動生成", prompt:"以下のメールに対して、丁寧かつ簡潔な返信文を作成してください。要点だけを伝えて、150字以内を目安にしてください。メール内容：[ここに貼り付け]" },
  { id:3,  cat:"work", title:"会議のアジェンダを作成", prompt:"[テーマ]についての30分の社内会議アジェンダを作成してください。参加者は[人数]名です。各項目に時間配分もつけてください。" },
  { id:4,  cat:"work", title:"資料の要点を3点でまとめる", prompt:"以下の資料・テキストの要点を3つの箇条書きでまとめてください。専門用語は平易な言葉に言い換えてください。内容：[ここに貼り付け]" },
  { id:5,  cat:"work", title:"週次報告書のテンプレートを作成", prompt:"毎週5分で書ける週次報告書テンプレートを作ってください。進捗・課題・来週の予定の3セクションを含め、全体で1ページ以内に収まる形式で。" },
  { id:6,  cat:"work", title:"上司への報告メールを代筆", prompt:"上司に対して[状況・内容]をわかりやすく報告するメールを作成してください。結論→理由→次の対応 の順に簡潔にまとめてください。" },
  { id:7,  cat:"work", title:"議事録を自動でまとめる", prompt:"以下の会議メモから、「決定事項」「ToDo（担当者・期限付き）」「次回議題」を整理した議事録を作成してください。メモ：[ここに貼り付け]" },
  { id:8,  cat:"work", title:"断りメールを角が立たないように書く", prompt:"[依頼内容]を丁重にお断りするメール文を作ってください。相手との関係を大切にしながら、理由を明確に伝えてください。" },
  { id:9,  cat:"work", title:"プレゼンの構成案を作る", prompt:"[テーマ]について[対象者・人数]向けに[時間]のプレゼンを行います。聞き手が行動を起こしたくなる構成案をスライドタイトル付きで提案してください。" },
  { id:10, cat:"work", title:"業務マニュアルのテンプレートを作成", prompt:"[業務名]の手順書テンプレートを作ってください。新入社員でも迷わず作業できるよう、ステップ形式で注意点も含めてください。" },
  { id:11, cat:"work", title:"テレワーク中の集中力を保つ作戦", prompt:"幼児がいる自宅でテレワークをしています。集中して仕事できる環境づくり・タイムスケジュールの工夫を具体的に提案してください。" },
  { id:12, cat:"work", title:"クライアントへの提案書の骨子作成", prompt:"[クライアント名・業種]に[サービス名]を提案する資料の骨子を作ってください。課題→解決策→費用対効果→実績の流れで。" },
  { id:13, cat:"work", title:"感謝・お礼のビジネスメールを作成", prompt:"[相手・お礼の内容]に対するお礼メールを作成してください。誠意が伝わりつつ、くどくならない文体でお願いします。" },

  // 👶 育児・子育て (14-26)
  { id:14, cat:"parenting", title:"子供の年齢別おすすめ絵本リスト", prompt:"[年齢]の子供に読み聞かせるのにぴったりな絵本を10冊リストアップしてください。各本の読み聞かせのポイントも一言添えてください。" },
  { id:15, cat:"parenting", title:"子供が熱を出したときの対処法", prompt:"[年齢]の子が38.5度の熱を出しています。今夜、保育園・病院が休みの状況でできる適切な対処法を教えてください。明日受診すべきサインも。" },
  { id:16, cat:"parenting", title:"読書感想文の書き方を子供に教える", prompt:"小学[学年]の子が『[本のタイトル]』の読書感想文を書く手助けをしてください。自分の言葉で書けるよう、質問形式で引き出すサポートをお願いします。" },
  { id:17, cat:"parenting", title:"夏休みの自由研究アイデア10選", prompt:"小学[学年]の子供が家にある材料でできる自由研究テーマを10個提案してください。難易度・かかる時間・用意するものも一覧で。" },
  { id:18, cat:"parenting", title:"子供をほめるときの言葉かけのコツ", prompt:"[年齢]の子供の自己肯定感を高める「ほめ方」のコツを教えてください。結果ではなくプロセスをほめる具体的なセリフ例も5パターン。" },
  { id:19, cat:"parenting", title:"子供との会話が弾むネタ集", prompt:"[年齢]の子供と夕食中に話せる、楽しい会話ネタを10個教えてください。思考力が育ち、親子の絆も深まるテーマが理想です。" },
  { id:20, cat:"parenting", title:"習い事選びのチェックリスト作成", prompt:"[年齢]の子供に習い事を始めさせたいと思っています。選ぶ際に確認すべきチェックリストと、各習い事のメリット・デメリット比較表を作ってください。" },
  { id:21, cat:"parenting", title:"子供の癇癪への対処法", prompt:"[年齢]の子がスーパーで癇癪を起こします。その場でできる冷静な対応方法と、癇癪を減らすための日常的な工夫を教えてください。" },
  { id:22, cat:"parenting", title:"連絡帳のポジティブな書き方", prompt:"保育園の連絡帳に、今日の子供のエピソード（[エピソード]）をほっこりする文章で書いてください。先生にも伝わる50字程度の文体で。" },
  { id:23, cat:"parenting", title:"子供のお小遣い管理の仕組みを作る", prompt:"小学[学年]の子供にお小遣いを渡し始めます。金銭感覚が育つお小遣いルールと管理の仕組みを具体的に提案してください。" },
  { id:24, cat:"parenting", title:"子供の友達トラブルの対処法", prompt:"子供が「○○ちゃんに仲間外れにされた」と言っています。[年齢]の子に適した、親として今夜できるサポートと声かけを教えてください。" },
  { id:25, cat:"parenting", title:"子供に仕事を上手に説明する", prompt:"「ママはどんな仕事をしているの？」と子供に聞かれました。[職種]を[年齢]の子供でも理解できる言葉で説明するセリフを作ってください。" },
  { id:26, cat:"parenting", title:"寝る前の読み聞かせをもっと楽しく", prompt:"[年齢]の子との寝る前の読み聞かせタイムをより楽しくする工夫（声の変え方・参加型の仕掛け・質問の仕方など）を具体的に教えてください。" },

  // 🏠 家事・家庭管理 (27-39)
  { id:27, cat:"home", title:"一週間の献立を栄養バランス良く作成", prompt:"仕事のある平日5日分の夕食献立を考えてください。調理時間は30分以内、子供（[年齢]）も食べられる、栄養バランスの良いメニューで。" },
  { id:28, cat:"home", title:"冷蔵庫の残り物でレシピ提案", prompt:"冷蔵庫に[食材リスト]があります。今夜の夕食（子供あり）を20分以内で作れるレシピを2〜3品提案してください。" },
  { id:29, cat:"home", title:"週末の作り置きレシピを計画", prompt:"日曜日に2時間で作れる作り置きおかずを5品提案してください。平日の弁当・夕食に使いまわせるバリエーション重視で。" },
  { id:30, cat:"home", title:"家の掃除スケジュールを作る", prompt:"共働き夫婦＋子供[人数]人の家庭向けに、平日・週末の無理のない掃除スケジュールを作ってください。一人でやらず家族で分担する形式で。" },
  { id:31, cat:"home", title:"季節の家事チェックリスト作成", prompt:"[季節]にやっておくべき家事・整理整頓のチェックリストを作ってください。保育園・学校関連の準備事項も含めてください。" },
  { id:32, cat:"home", title:"食材の買い物リストを自動作成", prompt:"今週の献立（[献立]）に必要な買い物リストを、売り場ごとに整理して作成してください。重複食材はまとめて、週の使い回しも考慮して。" },
  { id:33, cat:"home", title:"子供部屋の整理収納アイデア", prompt:"[年齢]の子供の部屋が散らかりがちです。子供が自分で片付けられるようになる収納レイアウト・収納グッズのアイデアを教えてください。" },

const filterWrap = document.getElementById('filterWrap');

allBtn.textContent = '✨ すべて';

// ===== RENDER CARDS =====
const grid = document.getElementById('grid');

ideas.forEach(idea => {
  const cat = catMap[idea.cat];
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cat = idea.cat;
  card.dataset.text = (idea.title + ' ' + idea.prompt).toLowerCase();
  card.style.setProperty('--card-accent', cat.color);
  card.style.setProperty('--card-light', cat.light);

  // top accent bar
  card.style.cssText += `--cat-color:${cat.color};`;

  card.innerHTML = `
    <style>.card[data-cat="${idea.cat}"]::before { background: ${cat.color}; }</style>
    <div class="card-header">
      <span class="card-num">${idea.id}</span>
      <span class="card-tag" style="background:${cat.light};color:${cat.color};">${cat.label}</span>
    </div>
    <div class="card-text">${idea.title}</div>
    <div class="card-prompt">${idea.prompt}</div>
    <div class="card-footer">
      <span class="copy-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        クリックしてコピー
      </span>
    </div>
  `;

  card.addEventListener('click', () => {
    navigator.clipboard.writeText(idea.prompt).then(() => {
      showToast();
      card.classList.add('copied');
      setTimeout(() => card.classList.remove('copied'), 400);
    });
  });

  grid.appendChild(card);
});

// ===== FILTER LOGIC =====
let currentCat = 'all';
let currentQuery = '';

function applyFilter() {
  const cards = document.querySelectorAll('.card');
  let count = 0;
  cards.forEach(card => {
    const catMatch = currentCat === 'all' || card.dataset.cat === currentCat;
    const textMatch = !currentQuery || card.dataset.text.includes(currentQuery);
    if (catMatch && textMatch) {
      card.classList.remove('hidden');
      count++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('resultCount').textContent =
    currentCat === 'all' && !currentQuery
      ? `全 ${count} 個のアイデア`
      : `${count} 個のアイデアが見つかりました`;
}

filterWrap.addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentCat = e.target.dataset.cat;
  applyFilter();
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentQuery = e.target.value.trim().toLowerCase();
  applyFilter();
});

// ===== TOAST =====
const toast = document.getElementById('toast');
let toastTimer;
function showToast() {
  clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== INIT =====
applyFilter();
</script>
</body>
</html>
